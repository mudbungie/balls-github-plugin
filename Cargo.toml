[package]
name = "balls-plugin-github"
version = "0.1.0"
edition = "2021"
description = "GitHub forge plugin for balls: deferred-mode delivery via pull requests"
license = "MIT"

[[bin]]
name = "balls-plugin-github"
path = "src/main.rs"

[dependencies]
chrono = { version = "0.4", features = ["serde"] }
clap = { version = "4", features = ["derive"] }
reqwest = { version = "0.12", features = ["blocking", "json"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"

[dev-dependencies]
assert_cmd = "2"
mockito = "1"
predicates = "3"
tempfile = "3"
