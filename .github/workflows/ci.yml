name: CI

on:
  pull_request:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  test:
    name: test + lint + coverage
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-tarpaulin
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-tarpaulin

      # The same gate `make check` runs locally and the pre-commit hook
      # enforces: tests, workspace clippy, the 300-line cap, 100% coverage.
      - name: cargo test
        run: cargo test --workspace --all-targets

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: line-length check
        run: bash scripts/check-line-lengths.sh

      - name: coverage (100%)
        run: bash scripts/check-coverage.sh
